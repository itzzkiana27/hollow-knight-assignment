guide.abilitiesTitle=Abilities and Knight Features
guide.healthTitle=Health masks
guide.healthDescription=The Knight health bar is made of masks. Taking damage removes masks. When all masks are lost, the death counter increases and the Knight respawns from the current checkpoint.
guide.soulTitle=Soul vessel
guide.soulDescription=Hit enemies with the Nail to gain Soul. Soul is spent to Focus for healing and to cast spell abilities.
guide.nailTitle=Nail combat
guide.nailDescription=The Nail is the primary attack. Up and down input change attack direction, and down attacks can pogo from enemies or spikes.
guide.dashAbilityTitle=Dash
guide.dashAbilityDescription=Dash gives the Knight a fast burst of movement. It can be upgraded by charms such as Dashmaster and Sharp Shadow.
guide.focusAbilityTitle=Focus
guide.focusAbilityDescription=Hold Focus while standing still and spending Soul to restore health masks.
guide.vengefulSpiritTitle=Vengeful Spirit / Shade Soul
guide.vengefulSpiritDescription=Casts a horizontal projectile in the facing direction. It spends Soul, passes through enemies, and stops when it hits the environment.
guide.howlingWraithsTitle=Howling Wraiths / Abyss Shriek
guide.howlingWraithsDescription=Casts a vertical scream above the Knight. It spends Soul and damages enemies inside the upper hitbox.
guide.charmsTitle=Charms
guide.charmsDescription=Open the charm inventory to equip passive upgrades. Charms can improve damage, Soul gain, healing speed, dash behavior, and Void abilities.
guide.cheatsTitle=Cheat Codes
guide.cheatKeyBossTeleport=Left Ctrl + B
guide.cheatKeyNoclip=Left Ctrl + F
guide.cheatKeyEmergencyHeal=Left Ctrl + H
guide.cheatKeySoul=Left Ctrl + S
guide.cheatKeyGodMode=Left Ctrl + G
guide.cheatKeyInstaKill=Left Ctrl + K
guide.fullHealthDescription=Restores all of the Knight's health.
guide.fullSoulDescription=Completely fills the Soul meter.
guide.invincibleDescription=Enables or disables invincibility.
guide.fastKnightDescription=Increases the Knight's movement speed.
guide.cheatBossTeleport=Teleport directly to the False Knight boss arena for quick boss testing.
guide.cheatNoclip=Toggle flight / noclip exploration mode. Gravity and collision are ignored and the Knight moves faster.
guide.cheatEmergencyHeal=Emergency heal. Adds one mask and revives the Knight if health reached zero.
guide.cheatSoul=Completely refill the Soul vessel.
guide.cheatGodMode=Toggle God Mode. Damage from spikes, enemies, and the boss is blocked.
guide.cheatInstaKill=Instantly kill every enemy currently active on the screen.

