zote.name=Zote the Mighty
zote.warning.1=Halt, noble knight, and mark my words well.
zote.warning.2=Beyond yonder pass rides a monarch with a heart of stone, cruel in judgment and colder than winter's iron.
zote.warning.3=Many brave souls have bent the knee before him, yet found no mercy beneath his crown.
zote.warning.4=Turn thy blade with wisdom, for valor alone shall not soften such a tyrant's heart.
zote.precept.1=Precept One: Always Win Your Battles. Losing a battle earns you nothing and teaches you nothing. Win your battles, or do not engage in them at all!
zote.precept.2=Precept Two: Never Let Them Laugh at You. Fools laugh at everything, even at their superiors. Laughter spreads like a disease, so strike at the source of such perverse merriment before it spreads.
zote.precept.3=Precept Three: Always Be Rested. Fighting and adventuring take their toll on your body. Rest strengthens and repairs you; the longer you rest, the stronger you become.
zote.precept.4=Precept Four: Forget Your Past. The past is painful, and dwelling on it brings only misery. Think instead of the future, or perhaps some food.
zote.precept.5=Precept Five: Strength Beats Strength. Is your opponent strong? Overcome that strength with even greater strength, and they will soon be defeated.

