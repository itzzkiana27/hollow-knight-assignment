guide.abilitiesTitle=Capacités et fonctions du Chevalier
guide.healthTitle=Masques de santé
guide.healthDescription=La barre de santé du Chevalier est composée de masques. Les dégâts retirent des masques. Quand ils sont tous perdus, le compteur de morts augmente et le Chevalier réapparaît au point de contrôle.
guide.soulTitle=Réceptacle d’âme
guide.soulDescription=Frappez les ennemis avec le clou pour gagner de l’âme. L’âme sert à se soigner par Concentration et à lancer les capacités magiques.
guide.nailTitle=Combat au clou
guide.nailDescription=Le clou est l’attaque principale. Les directions haut et bas changent la direction de l’attaque, et les attaques vers le bas permettent de rebondir sur les ennemis ou les piques.
guide.dashAbilityTitle=Ruée
guide.dashAbilityDescription=La ruée donne une impulsion rapide au Chevalier. Des charmes comme Maître de la ruée et Ombre tranchante peuvent l’améliorer.
guide.focusAbilityTitle=Concentration
guide.focusAbilityDescription=Maintenez Concentration en restant immobile et en dépensant de l’âme pour restaurer des masques.
guide.vengefulSpiritTitle=Esprit vengeur / Âme d’ombre
guide.vengefulSpiritDescription=Lance un projectile horizontal dans la direction regardée. Il dépense de l’âme, traverse les ennemis et s’arrête contre l’environnement.
guide.howlingWraithsTitle=Spectres hurlants / Cri des Abysses
guide.howlingWraithsDescription=Lance un cri vertical au-dessus du Chevalier. Il dépense de l’âme et blesse les ennemis dans la zone supérieure.
guide.charmsTitle=Charmes
guide.charmsDescription=Ouvrez l’inventaire de charmes pour équiper des améliorations passives. Les charmes peuvent améliorer les dégâts, le gain d’âme, la vitesse de soin, la ruée et les pouvoirs du Vide.
