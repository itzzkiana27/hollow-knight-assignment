guide.cheatKeyInstaKill=Ctrl gauche + K
guide.fullHealthDescription=Restaure toute la santé du Chevalier.
guide.fullSoulDescription=Remplit complètement la jauge d’âme.
guide.invincibleDescription=Active ou désactive l’invincibilité.
guide.fastKnightDescription=Augmente la vitesse de déplacement du Chevalier.
guide.cheatBossTeleport=Téléporte directement dans l’arène du Faux Chevalier pour tester rapidement le boss.
guide.cheatNoclip=Active ou désactive le mode vol / noclip. La gravité et les collisions sont ignorées et le Chevalier se déplace plus vite.
guide.cheatEmergencyHeal=Soin d’urgence. Ajoute un masque et ranime le Chevalier si sa santé est tombée à zéro.
guide.cheatSoul=Remplit complètement le réceptacle d’âme.
guide.cheatGodMode=Active ou désactive le mode Dieu. Les dégâts des piques, des ennemis et du boss sont bloqués.
guide.cheatInstaKill=Tue instantanément tous les ennemis actuellement actifs à l’écran.

