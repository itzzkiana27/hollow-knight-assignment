zote.name=Zote le Puissant
zote.warning.1=Halte, noble chevalier, et écoute bien mes paroles.
zote.warning.2=Au-delà de ce passage règne un monarque au cœur de pierre, cruel dans ses jugements et plus froid que le fer de l’hiver.
zote.warning.3=Nombre d’âmes courageuses se sont agenouillées devant lui sans jamais trouver de pitié sous sa couronne.
zote.warning.4=Manie ta lame avec sagesse, car la bravoure seule ne saurait adoucir le cœur d’un tel tyran.
zote.precept.1=Précepte un : Gagne toujours tes batailles. Perdre une bataille ne t’apporte rien et ne t’apprend rien. Gagne tes batailles, ou ne les engage pas du tout !
zote.precept.2=Précepte deux : Ne les laisse jamais rire de toi. Les imbéciles rient de tout, même de leurs supérieurs. Le rire se répand comme une maladie ; frappe donc à la source de cette joie perverse avant qu’elle ne se propage.
zote.precept.3=Précepte trois : Sois toujours reposé. Les combats et les aventures fatiguent ton corps. Le repos le fortifie et le répare ; plus tu te reposes, plus tu deviens fort.
zote.precept.4=Précepte quatre : Oublie ton passé. Le passé est douloureux et y penser ne mène qu’au malheur. Pense plutôt à l’avenir, ou peut-être à quelque nourriture.
zote.precept.5=Précepte cinq : La force vainc la force. Ton adversaire est-il puissant ? Surpasse sa force par une force encore plus grande, et il sera bientôt vaincu.

