guide.focusAbilityTitle=Focus
guide.focusAbilityDescription=Maintenez Focus en restant immobile et en depensant de l ame pour restaurer des masques.
guide.vengefulSpiritTitle=Vengeful Spirit / Shade Soul
guide.vengefulSpiritDescription=Lance un projectile horizontal dans la direction regardee. Il depense de l ame, traverse les ennemis et s arrete contre l environnement.
guide.howlingWraithsTitle=Howling Wraiths / Abyss Shriek
guide.howlingWraithsDescription=Lance un cri vertical au-dessus du Chevalier. Il depense de l ame et blesse les ennemis dans la hitbox superieure.
guide.charmsTitle=Charmes
guide.charmsDescription=Ouvrez l inventaire de charmes pour equiper des ameliorations passives. Les charmes peuvent modifier les degats, l ame, la vitesse de soin, le dash et les pouvoirs du Vide.
guide.cheatBossTeleport=Teleporte directement dans l arene du False Knight pour tester le boss rapidement.
guide.cheatNoclip=Active ou desactive le mode vol / noclip. La gravite et les collisions sont ignorees et le Chevalier va plus vite.
guide.cheatEmergencyHeal=Soin d urgence. Ajoute un masque et ranime le Chevalier si sa sante est tombee a zero.
guide.cheatSoul=Remplit completement le vase d ame.
guide.cheatGodMode=Active ou desactive le God Mode. Les degats des piques, ennemis et boss sont bloques.
guide.cheatInstaKill=Tue instantanement chaque ennemi actif a l ecran.
