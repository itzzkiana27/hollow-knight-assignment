guide.abilitiesTitle=Capacites et fonctions du Chevalier
guide.healthTitle=Masques de sante
guide.healthDescription=La barre de sante du Chevalier est composee de masques. Les degats retirent des masques. Quand ils sont tous perdus, le compteur de morts augmente et le Chevalier reapparait au checkpoint.
guide.soulTitle=Vase d ame
guide.soulDescription=Frappez les ennemis avec le clou pour gagner de l ame. L ame sert a se soigner avec Focus et a lancer les capacites magiques.
guide.nailTitle=Combat au clou
guide.nailDescription=Le clou est l attaque principale. Les directions haut et bas changent la direction de l attaque, et les attaques vers le bas peuvent pogo sur les ennemis ou les piques.
guide.dashAbilityTitle=Dash
guide.dashAbilityDescription=Le dash donne une impulsion rapide au Chevalier. Des charmes comme Dashmaster et Sharp Shadow peuvent l ameliorer.

guide.cheatsTitle=Codes de triche
guide.fullHealthDescription=Restaure toute la santé du Chevalier.
guide.fullSoulDescription=Remplit complčtement la jauge d'âme.
guide.invincibleDescription=Active ou désactive l'invincibilité.
guide.fastKnightDescription=Augmente la vitesse de déplacement du Chevalier.
